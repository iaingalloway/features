name: "Test Features"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        feature: [gitversion, markdownlint-cli2, sval, vale]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install @devcontainers/cli
        run: npm install -g @devcontainers/cli

      - name: Test feature
        run: devcontainer features test --skip-autogenerated -f ${{ matrix.feature }} .
